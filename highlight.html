<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精彩瞬间 - 贵州村超模式介绍</title>
    <link rel="stylesheet" href="highlight.css">
</head>
<body>
    <nav class="nav-bar">
        <div class="logo">
            <img src="logo.jpg" alt="贵州村超logo">
            <h1>贵州村超模式介绍</h1>
        </div>
        <ul class="menu">
            <li><a href="index.html">首页</a></li>
            <li><a href="history.html">村超历史</a></li>
            <li><a href="match.html">赛程与赛制</a></li>
            <li><a href="highlight.html">精彩瞬间</a></li>
            <li><a href="meaning.html">模式意义</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 class="page-title">精彩瞬间</h2>

        <!-- 模块1：图集分类标签（匹配highlight.css的tab） -->
        <section class="section">
            <div class="highlight-tab">
                <div class="tab-item active">全部瞬间</div>
                <div class="tab-item">比赛现场</div>
                <div class="tab-item">球迷氛围</div>
                <div class="tab-item">民俗表演</div>
                <div class="tab-item">颁奖时刻</div>
            </div>
        </section>

        <!-- 模块2：核心瀑布流图集（匹配highlight.css的gallery，视觉核心） -->
        <section class="section">
            <div class="highlight-gallery">
                <!-- 比赛瞬间 -->
                <div class="gallery-item">
                    <img src="微信图片_20260313220428.jpg" alt="球员凌空抽射瞬间">
                    <p>球员凌空抽射，精彩破门</p>
                </div>
                <div class="gallery-item">
                    <img src="微信图片_20260313220508.jpg" alt="门将精彩扑救">
                    <p>门将飞身扑救，化解必进球</p>
                </div>
                <div class="gallery-item">
                    <img src="微信图片_20260313220633.jpg" alt="球员庆祝进球">
                    <p>球队进球后，球员与球迷共同庆祝</p>
                </div>
                <!-- 球迷氛围 -->
                <div class="gallery-item">
                    <img src="微信图片_20260313220706.jpg" alt="球迷举牌加油">
                    <p>现场球迷举牌为球队加油，氛围热烈</p>
                </div>
                <div class="gallery-item">
                    <img src="微信图片_20260313220710.jpg" alt="小朋友球迷">
                    <p>小小球迷专注观赛，传承足球热爱</p>
                </div>
                <!-- 民俗表演（占2列，更显眼） -->
                <div class="gallery-item">
                    <img src="微信图片_20260313220728.jpg" alt="侗族大歌表演">
                    <p>中场休息，侗族大歌民俗表演</p>
                </div>
                <div class="gallery-item">
                    <img src="微信图片_20260313220732.jpg" alt="苗族芦笙舞">
                    <p>苗族芦笙舞表演，尽显民族特色</p>
                </div>
                <!-- 颁奖时刻 -->
                <div class="gallery-item">
                    <img src="微信图片_20260313220928.jpg" alt="冠军队伍颁奖">
                    <p>202X年村超冠军队伍颁奖现场</p>
                </div>
                <!-- 视频卡片（匹配video-card，占2列，标注播放按钮） -->
                <div class="gallery-item video-card">
                    <img src="微信图片_20260313220932.jpg" alt="村超精彩进球集锦">
                    <p>村超202X年精彩进球集锦</p>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>©2026 【黔程万里】 贵州村超模式介绍网页 | 制作于MacBook VSCode</p>
        <p>本网页仅用于小组项目展示，素材均来源于网络</p>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
